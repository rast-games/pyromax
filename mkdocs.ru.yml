docs_dir: docs/ru
site_name: Pyromax Docs
site_description: Асинхронный фреймворк для ботов MAX Messenger
site_url: https://github.com/rast-games/Pyromax
repo_url: https://github.com/rast-games/Pyromax
site_author: Rast
theme:
  name: material
  language: ru
  features:
    - content.tabs.link
    - navigation.sections
    - navigation.top
nav:
  - Главная: index.md
  - Быстрый старт: quickstart.md
  - Роутеры: routers.md
  - Фильтры: filters.md
  - Форматирование: formatting.md
  - Исключения: exceptions.md
  - API: api.md
plugins:
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_category: true
            members_order: source
  - search
markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
#  - pymdownx.emoji:
#      emoji_index: !!python/name:materialx.emoji.twemoji
#      emoji_name_icons: true